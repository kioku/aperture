# Rule: max-nesting-depth
# Prevents control flow blocks or closures nested more than 3 levels deep
#
# Bad:
#   if a {
#       for x in items {
#           if b {
#               while c {  // 4th level - violation
#               }
#           }
#       }
#   }
#
#   outer.iter().for_each(|a| {
#       inner.iter().for_each(|b| {
#           deep.iter().for_each(|c| {
#               deeper.iter().for_each(|d| { // 4th closure - violation
#               });
#           });
#       });
#   });
#
# Good:
#   Extract deeply nested logic into helper functions
#
# Note: closure_expression counts as a nesting contributor alongside control
# flow forms. fn items (fn_item) do not — named functions reset scope.

id: max-nesting-depth
language: rust
severity: error
message: "Block nesting exceeds 3 levels. Consider extracting to helper functions."

rule:
  any:
    - kind: if_expression
    - kind: for_expression
    - kind: while_expression
    - kind: loop_expression
    - kind: match_expression
    - kind: closure_expression
  inside:
    stopBy: end
    any:
      - kind: if_expression
      - kind: for_expression
      - kind: while_expression
      - kind: loop_expression
      - kind: match_expression
      - kind: closure_expression
    inside:
      stopBy: end
      any:
        - kind: if_expression
        - kind: for_expression
        - kind: while_expression
        - kind: loop_expression
        - kind: match_expression
        - kind: closure_expression
      inside:
        stopBy: end
        any:
          - kind: if_expression
          - kind: for_expression
          - kind: while_expression
          - kind: loop_expression
          - kind: match_expression
          - kind: closure_expression

note: |
  Deep nesting makes code hard to read and maintain.
  Refactoring strategies:
  - Extract inner blocks to named helper functions
  - Use early returns with let-else or guard clauses
  - Use iterators and combinators instead of nested loops
