name: Binary Size

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to record (e.g. 0.1.9). Defaults to Cargo.toml version.'
        required: false
  push:
    branches:
      - '97/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  measure:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    outputs:
      # Each job exposes its byte count for the record job to collect.
      # Key names are the full target triple with non-alphanumeric chars replaced by '_',
      # matching what the "Report size" steps write to GITHUB_OUTPUT via sed/replace.
      size_x86_64_unknown_linux_gnu:  ${{ steps.size.outputs.size_x86_64_unknown_linux_gnu }}
      size_x86_64_unknown_linux_musl: ${{ steps.size.outputs.size_x86_64_unknown_linux_musl }}
      size_aarch64_unknown_linux_gnu: ${{ steps.size.outputs.size_aarch64_unknown_linux_gnu }}
      size_x86_64_apple_darwin:       ${{ steps.size.outputs.size_x86_64_apple_darwin }}
      size_aarch64_apple_darwin:      ${{ steps.size.outputs.size_aarch64_apple_darwin }}
      # Windows uses a separate step ID (size_win) because the Unix step is skipped on Windows.
      size_x86_64_pc_windows_msvc:    ${{ steps.size_win.outputs.size_x86_64_pc_windows_msvc }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build release (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build release (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Report size (Unix)
        id: size
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/aperture
          SIZE=$(wc -c < "$BIN")
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "${{ matrix.target }}: $SIZE bytes (${SIZE_MB} MB)"
          echo "### ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "| Binary | Bytes | MB |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|----|" >> $GITHUB_STEP_SUMMARY
          echo "| aperture | $SIZE | ${SIZE_MB} MB |" >> $GITHUB_STEP_SUMMARY
          # Expose size under a stable key derived from the target triple.
          KEY=$(echo "${{ matrix.target }}" | sed 's/[^a-z0-9]/_/g')
          echo "size_${KEY}=${SIZE}" >> $GITHUB_OUTPUT

      - name: Report size (Windows)
        id: size_win
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target\${{ matrix.target }}\release\aperture.exe"
          $size = (Get-Item $bin).Length
          $sizeMB = [math]::Round($size / 1MB, 2)
          Write-Host "${{ matrix.target }}: $size bytes ($sizeMB MB)"
          @"
          ### ${{ matrix.target }}
          | Binary | Bytes | MB |
          |--------|-------|----|
          | aperture.exe | $size | $sizeMB MB |
          "@ >> $env:GITHUB_STEP_SUMMARY
          $key = "${{ matrix.target }}" -replace '[^a-z0-9]', '_'
          "size_${key}=${size}" >> $env:GITHUB_OUTPUT

  record:
    name: Update binary-sizes.json
    runs-on: ubuntu-latest
    needs: measure
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          # Push back to the triggering branch, not a detached HEAD.
          ref: ${{ github.ref }}

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')" >> $GITHUB_OUTPUT
          fi

      - name: Append measurement to binary-sizes.json
        shell: bash
        env:
          VERSION:       ${{ steps.version.outputs.version }}
          SIZE_X86_64_LINUX_GNU:  ${{ needs.measure.outputs.size_x86_64_unknown_linux_gnu }}
          SIZE_X86_64_LINUX_MUSL: ${{ needs.measure.outputs.size_x86_64_unknown_linux_musl }}
          SIZE_AARCH64_LINUX_GNU: ${{ needs.measure.outputs.size_aarch64_unknown_linux_gnu }}
          SIZE_X86_64_DARWIN:     ${{ needs.measure.outputs.size_x86_64_apple_darwin }}
          SIZE_AARCH64_DARWIN:    ${{ needs.measure.outputs.size_aarch64_apple_darwin }}
          SIZE_X86_64_WINDOWS:    ${{ needs.measure.outputs.size_x86_64_pc_windows_msvc }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          NEW_ENTRY=$(jq -n \
            --arg version  "$VERSION" \
            --arg date     "$DATE" \
            --argjson gnu  "$SIZE_X86_64_LINUX_GNU" \
            --argjson musl "$SIZE_X86_64_LINUX_MUSL" \
            --argjson arm  "$SIZE_AARCH64_LINUX_GNU" \
            --argjson mac  "$SIZE_X86_64_DARWIN" \
            --argjson m1   "$SIZE_AARCH64_DARWIN" \
            --argjson win  "$SIZE_X86_64_WINDOWS" \
            '{
              version: $version,
              date: $date,
              targets: [
                { target: "x86_64-unknown-linux-gnu",  provider: "ring",      bytes: $gnu  },
                { target: "x86_64-unknown-linux-musl",  provider: "ring",      bytes: $musl },
                { target: "aarch64-unknown-linux-gnu",  provider: "ring",      bytes: $arm  },
                { target: "x86_64-apple-darwin",        provider: "ring",      bytes: $mac  },
                { target: "aarch64-apple-darwin",       provider: "ring",      bytes: $m1   },
                { target: "x86_64-pc-windows-msvc",     provider: "aws_lc_rs", bytes: $win  }
              ]
            }')
          # Replace any existing entry for this version, then append the new one.
          jq --argjson entry "$NEW_ENTRY" \
            '.measurements = ([ .measurements[] | select(.version != $entry.version) ] + [$entry])' \
            docs/binary-sizes.json > docs/binary-sizes.json.tmp
          mv docs/binary-sizes.json.tmp docs/binary-sizes.json

      - name: Commit updated binary-sizes.json
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/binary-sizes.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: record binary sizes for v${{ steps.version.outputs.version }}"
            git push
          fi
